<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKS ONLINE - Login</title>
    <style>
        /* Reset and Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; min-height: 100vh; background-color: #eaedf1; color: #333; }

        /* Sidebar Styles */
        .sidebar { width: 250px; background-color: #343a40; color: #fff; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 10; }
        .sidebar-header { background-color: #fb3939; padding: 20px; display: flex; align-items: center; gap: 15px; font-weight: bold; font-size: 1.1rem; letter-spacing: 0.5px;}
        .sidebar-header img { width: 32px; height: 32px; background: white; border-radius: 4px; padding: 2px; }
        
        .nav-list { list-style: none; padding: 10px 0; }
        .nav-item { padding: 15px 20px; color: #adb5bd; text-decoration: none; display: block; font-size: 0.95rem; border-left: 4px solid transparent; transition: 0.2s; }
        .nav-item:hover { background-color: #495057; color: #fff; }
        .nav-item.active { background-color: #495057; color: #fff; border-left-color: #fb3939; }
        .nav-category { padding: 25px 20px 10px; font-size: 0.75rem; text-transform: uppercase; color: #6c757d; font-weight: bold; letter-spacing: 0.5px; }

        /* Main Content Styles */
        .main-content { flex: 1; padding: 60px; display: flex; flex-direction: column; }
        .page-title { margin-bottom: 30px; }
        .page-title h1 { font-size: 2.2rem; font-weight: 600; color: #212529; }
        .page-title p { font-size: 1.1rem; color: #6c757d; margin-top: 5px; }

        /* Form Card Styles */
        .login-card { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 500px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #495057; }
        .form-control { width: 100%; padding: 12px 15px; border: 1px solid #ced4da; border-radius: 4px; font-size: 1rem; transition: border-color 0.2s; }
        .form-control:focus { outline: none; border-color: #86b7fe; box-shadow: 0 0 0 3px rgba(13,110,253,.25); }
        
        .btn-submit { width: 100%; padding: 14px; background-color: #0d6efd; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; transition: background-color 0.2s; font-weight: 500; }
        .btn-submit:hover { background-color: #0b5ed7; }

        /* Flash messages for Login Errors */
        .flash { padding: 15px; background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; border-radius: 4px; margin-bottom: 20px; max-width: 500px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <img src="{{ url_for('static', filename='PKS.png') }}" alt="Logo" onerror="this.style.display='none'">
            PKS ONLINE
        </div>
        <ul class="nav-list">
            <li><a href="{{ url_for('dashboard') }}" class="nav-item">Dashboard</a></li>
            <li><a href="{{ url_for('login') }}" class="nav-item active">Student Login</a></li>
            <li><a href="{{ url_for('register') }}" class="nav-item">Register</a></li>
            
            <li class="nav-category">Classrooms</li>
            <li><a href="#" class="nav-item">Grade 1-6</a></li>
            <li><a href="{{ url_for('admin_panel') }}" class="nav-item">Administrator</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="page-title">
            <h1>Login For Student</h1>
            <p>เข้าสู่ระบบ</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="flash">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="login-card">
            <form method="POST">
                <div class="form-group">
                    <label>Username (เลขประจำตัวนักเรียน)</label>
                    <input type="text" name="username" class="form-control" placeholder="ใส่รหัสนักเรียน" required>
                </div>
                
                <div class="form-group">
                    <label>Password (วัน/เดือน/ปี เกิด)</label>
                    <input type="password" name="password" class="form-control" placeholder="เช่น 01/05/2552" required>
                </div>
                
                <button type="submit" class="btn-submit">Submit</button>
            </form>
        </div>
    </div>

</body>
</html>
