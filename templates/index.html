<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKS ONLINE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; min-height: 100vh; background-color: #e9ecef; }
        .sidebar { width: 260px; background-color: #343a40; color: white; flex-shrink: 0; }
        .sidebar-header { background-color: #ff4d4d; padding: 20px; font-weight: bold; font-size: 1.2rem; text-align: center; }
        .nav-link { color: #adb5bd; padding: 15px; border-bottom: 1px solid #495057; }
        .nav-link:hover { background-color: #495057; color: white; }
        .main-content { flex-grow: 1; padding: 40px; }
        .login-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 450px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="https://i.ibb.co/SXYxr1ZG/PKS.png" alt="Logo" style="width: 30px; height: 30px; margin-right: 10px; vertical-align: middle;">
            PKS ONLINE
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" href="/">Dashboard</a>
            <a class="nav-link" href="/">Student Login</a>
            <a class="nav-link" href="/register">Register</a>
            <hr>
            <small class="px-3 text-secondary">Classrooms</small>
            <a class="nav-link" href="#">Grade 1-6</a>
            <a class="nav-link" href="#">Administrator</a>
        </nav>
    </div>
    <div class="main-content">
        <h2>Login For Student</h2>
        <h5 class="text-secondary mb-4">เข้าสู่ระบบ</h5>
        <div class="login-card">
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label">Username (เลขประจำตัวนักเรียน)</label>
                    <input type="text" name="student_id" class="form-control" placeholder="ใส่รหัสนักเรียน" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password (วัน/เดือน/ปี เกิด)</label>
                    <input type="text" name="dob" class="form-control" placeholder="เช่น 01/05/2552" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
