<!DOCTYPE html>
<html lang="th">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Register - PKS ONLINE</title>
</head>
<body class="bg-light p-5">
    <div class="card mx-auto shadow-sm" style="max-width: 420px;">
        <div class="card-body">
            <h3 class="fw-bold mb-3">ลงทะเบียนนักเรียนใหม่</h3>
            <form action="/register" method="POST">
                <div class="mb-3">
                    <label class="form-label">ชื่อ-นามสกุล (Name)</label>
                    <input type="text" name="name" class="form-control" placeholder="เด็กชายสมชาย เรียนดี" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">เลขประจำตัวนักเรียน (Student ID)</label>
                    <input type="text" name="student_id" class="form-control" placeholder="676767" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">วัน/เดือน/ปีเกิด (Password)</label>
                    <input type="text" name="dob" class="form-control" placeholder="01/05/2552" required>
                </div>
                <button type="submit" class="btn btn-success w-100 mb-2">ยืนยันการลงทะเบียน</button>
            </form>
            <a href="/" class="btn btn-link w-100 text-secondary">กลับหน้าหลัก</a>
        </div>
    </div>
</body>
</html>
