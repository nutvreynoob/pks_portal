<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKS Portal - Register</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='PKS.png') }}">
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 400px; background: white; margin: 50px auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .logo-large { width: 220px; height: auto; margin-bottom: 15px; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.15)); }
        .btn { background: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .flash { padding: 10px; background: #f8d7da; color: #721c24; border-radius: 5px; margin-bottom: 15px; text-align: center; font-size: 14px; border: 1px solid #f5c6cb; }
        .input-field { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="container">
        <img src="{{ url_for('static', filename='PKS.png') }}" class="logo-large" alt="PKS Logo">
        <h2>Create Student Account</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="flash">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" style="text-align: left;">
            <label style="font-weight: bold;">Choose Username:</label>
            <input type="text" name="username" class="input-field" required>
            
            <label style="font-weight: bold;">Password:</label>
            <input type="password" name="password" class="input-field" required>
            
            <button type="submit" class="btn">Register</button>
        </form>
        <p style="margin-top: 20px; font-size: 14px;">Already registered? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</body>
</html>
