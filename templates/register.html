<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKS Portal - Register</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .login-box h2 { margin-top: 0; color: #333; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .login-box button:hover { background: #0056b3; }
        .links { margin-top: 15px; text-align: center; }
        .links a { color: #007bff; text-decoration: none; }
        .flash { padding: 10px; background: #f8d7da; color: #721c24; border-radius: 5px; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Register (ลงทะเบียน)</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="flash">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <label>Student ID (รหัสนักเรียน 5 หลัก)</label>
            <input type="text" name="student_id" placeholder="เช่น 12345" required>

            <label>Username (ชื่อผู้ใช้)</label>
            <input type="text" name="username" placeholder="ตั้งชื่อผู้ใช้ของคุณ" required>
            
            <label>Password (รหัสผ่าน)</label>
            <input type="password" name="password" placeholder="ตั้งรหัสผ่าน" required>
            
            <button type="submit">Register</button>
        </form>
        <div class="links">
            <a href="{{ url_for('login') }}">Already have an account? Login here</a>
        </div>
    </div>
</body>
</html>
